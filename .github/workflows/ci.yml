name: CI

# Pre-merge gate for dusk-crux. Runs in this repo only (no workspace, no
# ocean) so it's fast and needs no cross-repo auth. The release pipeline in
# Dusk-Inc/dusk-workspace is the authoritative build — this one just blocks
# PRs that can't pass their own `npm test`.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
