name: Publish container

# Builds and pushes the official dusk-crux Docker image to Docker Hub.
#
# Tag policy (via docker/metadata-action):
#   push to main       → :main, :main-<short-sha>
#   release v1.0.7     → :1.0.7, :1.0, :1, :latest
#   workflow_dispatch  → :<ref> (manual / debug builds)
#
# `:latest` follows the most recent release, not main, so consumers who pin
# to `:latest` get a tagged version rather than a moving HEAD.
#
# Auth via Docker Hub access token stored as environment secrets on the
# `dockerhub` GitHub environment:
#   DOCKERHUB_USERNAME — the Docker Hub user or org login
#   DOCKERHUB_TOKEN    — a Docker Hub access token (NOT your password)
# Set these under Settings → Environments → dockerhub.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_NAME: duskinc/dusk-crux

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    environment: dockerhub
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm test

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
